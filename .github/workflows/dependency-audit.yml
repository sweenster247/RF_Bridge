name: Dependency audit

on:
  pull_request:
    paths:
      - ".github/dependabot.yml"
      - ".github/workflows/dependency-audit.yml"
      - "pyproject.toml"
      - "requirements.txt"
  push:
    branches:
      - main
    paths:
      - ".github/dependabot.yml"
      - ".github/workflows/dependency-audit.yml"
      - "pyproject.toml"
      - "requirements.txt"
  schedule:
    - cron: "18 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Audit Python dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install application dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Record resolved dependency versions
        run: |
          python -m pip list --format=freeze | sort | tee dependency-versions.txt

      - name: Upload dependency version report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-versions
          path: dependency-versions.txt

      - name: Install vulnerability scanner
        run: python -m pip install pip-audit

      - name: Audit application dependencies
        run: pip-audit --requirement requirements.txt --progress-spinner off --strict
